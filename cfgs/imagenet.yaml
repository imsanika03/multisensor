# Full ImageNet-1k. REQUIRES a manual ImageNet download; set `data_root` to
#   <data_root>/train/<wnid>/*.JPEG
#
# ⚠️ VERY HEAVY: ~1.28M images, split 70/10/10/10. Training three ResNet50 stages
# (up to 448px) for up to 30 epochs is days of compute. Recommended before a real
# run: drop `epochs` (e.g. 3-5), and/or shrink the cascade. Evaluation here is the
# held-out 10% slice of the train folder (the pipeline splits a single dataset);
# evaluating on the official val set would need a separate-eval-split change to
# main.py -- ask if you want that.
dataset: imagenet
data_root: /home/sanikabhar/data/imagenet   # <-- EDIT ME
cascade_id: imagenet1k_res_cascade_v1
checkpoint_dir: checkpoints
num_workers: 8
data_parallel: true

train:
  pretrained: true
  epochs: 30         # consider lowering to 3-5 for full ImageNet
  batch_size: 64
  lr: 0.001
  patience: 8

probe:
  resolution: 96
  z_dim: 128
  epochs: 40
  batch_size: 64
  lr: 0.001
  cls_weight: 0.1
  weight_decay: 0.01

routing:
  epsilon: 0.05
  delta: 0.05

cascade:
  f1: {backbone: resnet50, resolution: 112}
  f2: {backbone: resnet50, resolution: 224}
  f3: {backbone: resnet50, resolution: 448}
