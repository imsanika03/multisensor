# Diverse-architecture cascade (for RC-VoI): three different inductive biases so
# per-example errors decorrelate -> the ensemble/skip actions have something to
# exploit (unlike the resolution cascade where f1/f2/f3 share an architecture and
# the action-oracle == select-oracle). All @224 (vit_b_16 needs fixed 224); cost
# ordering f1 < f2 < f3 comes from the architectures (~1.8 / 4.5 / 17.5 GFLOPs).
dataset: imagenette
cascade_id: imagenette_diverse_v1
checkpoint_dir: checkpoints
num_workers: 8
data_parallel: true

train:
  pretrained: true
  epochs: 30
  batch_size: 64
  lr: 0.001
  patience: 8

probe:
  resolution: 96
  z_dim: 128
  epochs: 40
  batch_size: 64
  lr: 0.001
  weight_decay: 0.01

routing:
  epsilon: 0.05
  delta: 0.05

cascade:                                  # per-stage lr: transformers/convnext need far lower lr than resnet
  f1: {backbone: resnet18,      resolution: 224}             # lr 1e-3 (default) fine for resnet
  f2: {backbone: convnext_tiny, resolution: 224, lr: 0.0001}
  f3: {backbone: vit_b_16,      resolution: 224, lr: 0.00003}
