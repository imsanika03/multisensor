dataset: imagenette
cascade_id: imagenette_res_cascade_v1   # reuses the validated cached checkpoints
checkpoint_dir: checkpoints
num_workers: 8
data_parallel: true

train:
  pretrained: true
  epochs: 30         # max epochs; early-stops on val-accuracy plateau
  batch_size: 64
  lr: 0.001
  patience: 8        # stop after 8 epochs with no val-accuracy improvement

probe:                 # multi-task one-shot router g_phi
  resolution: 96
  z_dim: 128
  epochs: 40
  batch_size: 64
  lr: 0.001
  weight_decay: 0.01
  lambdas:             # multi-task loss weights (all default 1.0)
    correctness: 1.0       # lambda1: predict P(f_k correct)
    lost_correction: 1.0   # lambda2: predict harm (f_k wrong & fM right) -- routing head
    oracle_route: 1.0      # lambda3: predict cheapest correct route
    ranking: 1.0           # lambda4: rank safe routings above harmful

routing:
  epsilon: 0.05
  delta: 0.05

cascade:
  f1: {backbone: resnet50, resolution: 112}
  f2: {backbone: resnet50, resolution: 224}
  f3: {backbone: resnet50, resolution: 448}
