# ImageNet-100: first 100 classes (sorted wnid order) of an ImageNet ImageFolder.
# REQUIRES a manual ImageNet download. Set `data_root` to a directory laid out as
#   <data_root>/train/<wnid>/*.JPEG
# (ImageNet is not auto-downloadable; torchvision cannot fetch it for you.)
dataset: imagenet100
data_root: /home/sanikabhar/data/imagenet   # <-- EDIT ME
cascade_id: imagenet100_res_cascade_v1
checkpoint_dir: checkpoints
num_workers: 8
data_parallel: true

train:
  pretrained: true
  epochs: 30
  batch_size: 64
  lr: 0.001
  patience: 8

probe:
  resolution: 96
  z_dim: 128
  epochs: 40
  batch_size: 64
  lr: 0.001
  cls_weight: 0.1
  weight_decay: 0.01

routing:
  epsilon: 0.05
  delta: 0.05

cascade:
  f1: {backbone: resnet50, resolution: 112}
  f2: {backbone: resnet50, resolution: 224}
  f3: {backbone: resnet50, resolution: 448}
